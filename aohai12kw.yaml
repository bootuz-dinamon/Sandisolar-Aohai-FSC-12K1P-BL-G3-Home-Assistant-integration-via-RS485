  # --- РЕГІСТР 218: РЕЖИМ ДРУГОГО AC ПОРТУ (GEN / OUTPUT2) ---
  # Holding register 218:
  #   0 = Default
  #   1 = порт працює як вхід генератора (GEN Input)
  #   3 = порт працює як другий вихід навантаження (Output 2 / Non-essential load)
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Second Port Mode"
    address: 218
    value_type: U_WORD
    entity_category: config
    icon: "mdi:swap-horizontal"
    optimistic: false
    optionsmap:
      "Default": 0
      "Generator Input": 1
      "Second Output": 3


