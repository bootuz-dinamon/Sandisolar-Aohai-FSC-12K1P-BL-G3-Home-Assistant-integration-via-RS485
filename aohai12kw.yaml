# 2. Температура батареї від BMS (Регістр 142)
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "BMS Battery Temperature"
    address: 142
    register_type: read
    value_type: S_WORD
    unit_of_measurement: "°C"
    device_class: temperature
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Temp LLC"
    address: 12
    register_type: read      # Читаємо як Input Register
    value_type: S_WORD       # 16-бітне число зі знаком (sint16)
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement
    icon: "mdi:thermometer"
    # Множимо на 0.1, щоб отримати коректне значення з десятковою комою
    filters:
      - multiply: 0.1

  # --- ЗАРЯД ЗА СЬОГОДНІ ---
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Energy Charge Today"
    address: 383                     # Початкова адреса (захопить 383 і 384)
    register_type: read
    value_type: U_DWORD             # 32-бітне число (uint32)
    unit_of_measurement: "kWh"
    accuracy_decimals: 1
    device_class: energy
    state_class: total_increasing
    icon: "mdi:battery-arrow-up"
    filters:
      - multiply: 0.1

  # --- ЗАГАЛЬНИЙ ЗАРЯД (TOTAL) ---
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Energy Charge Total"
    address: 385                     # Початкова адреса (захопить 385 і 386)
    register_type: read
    value_type: U_DWORD
    unit_of_measurement: "kWh"
    accuracy_decimals: 1
    device_class: energy
    state_class: total_increasing
    icon: "mdi:battery-plus"
    filters:
      - multiply: 0.1

  # --- РОЗРЯД ЗА СЬОГОДНІ ---
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Energy Discharge Today"
    address: 387                     # Початкова адреса (захопить 387 і 388)
    register_type: read
    value_type: U_DWORD
    unit_of_measurement: "kWh"
    accuracy_decimals: 1
    device_class: energy
    state_class: total_increasing
    icon: "mdi:battery-arrow-down"
    filters:
      - multiply: 0.1

  # --- ЗАГАЛЬНИЙ РОЗРЯД (TOTAL) ---
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Energy Discharge Total"
    address: 389                     # Початкова адреса (захопить 389 і 390)
    register_type: read
    value_type: U_DWORD
    unit_of_measurement: "kWh"
    accuracy_decimals: 1
    device_class: energy
    state_class: total_increasing
    icon: "mdi:battery-minus"
    filters:
      - multiply: 0.1

  # NTC темп
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Temp External NTC"
    address: 13              # Змініть на точну адресу регістра з вашої таблиці!
    register_type: read      # Читаємо як Input Register
    value_type: S_WORD       # 16-бітне число зі знаком (sint16)
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement
    icon: "mdi:thermometer-bluetooth" # Іконка зовнішнього/виносного датчика
    # Множимо на 0.1, оскільки китайські NTC-налаштування майже завжди йдуть без коми
    filters:
      - multiply: 0.1

# --- СОНЯЧНА ГЕНЕРАЦІЯ ЗА СЬОГОДНІ ---
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Solar Generation Today"
    address: 379                     # Стартова адреса (захопить 379 та 380 регістри)
    register_type: read
    value_type: U_DWORD             # 32-бітне число (uint32)
    unit_of_measurement: "kWh"
    accuracy_decimals: 1
    device_class: energy
    state_class: total_increasing
    icon: "mdi:solar-power-variant"
    filters:
      - multiply: 0.1

  # --- ЗАГАЛЬНА СОНЯЧНА ГЕНЕРАЦІЯ (TOTAL) ---
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Solar Generation Total"
    address: 381                     # Стартова адреса (захопить 381 та 382 регістри)
    register_type: read
    value_type: U_DWORD
    unit_of_measurement: "kWh"
    accuracy_decimals: 1
    device_class: energy
    state_class: total_increasing
    icon: "mdi:solar-panel-large"
    filters:
      - multiply: 0.1


  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Power Total Apparent ALL"
    address: 284                     # Стартова адреса (захопить 284 та 285)
    register_type: read
    value_type: U_DWORD             # 32-бітне число (uint32)
    unit_of_measurement: "VA"
    accuracy_decimals: 1
    device_class: apparent_power
    state_class: measurement
    icon: "mdi:flash"
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Power Total Reactive  ALL"
    address: 288                     # Стартова адреса (захопить 288 та 289)
    register_type: read
    value_type: S_DWORD             # Використовуємо 32-бітне число зі знаком (sint32)
    unit_of_measurement: "var"
    accuracy_decimals: 1
    device_class: reactive_power
    state_class: measurement
    icon: "mdi:flash-outline"
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Power Factor"
    address: 52
    register_type: read      # Читаємо як Input Register
    value_type: S_WORD       # 16-бітне число зі знаком (sint16)
    unit_of_measurement: ""  # Коефіцієнт потужності є безрозмірною величиною
    accuracy_decimals: 2     # Показуватиме, наприклад, 0.97 чи 1.00
    device_class: power_factor
    state_class: measurement
    icon: "mdi:angle-acute"
    filters:
      - multiply: 0.0001


  # --- НАПРУГА EPS (РЕЗЕРВ) ---
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "EPS Voltage"
    address: 55
    register_type: read      # Читаємо як Input Register
    value_type: U_WORD       # 16-бітне число без знаку (uint16)
    unit_of_measurement: "V"
    accuracy_decimals: 1
    device_class: voltage
    state_class: measurement
    icon: "mdi:flash-outline"
    filters:
      - multiply: 0.1

  # --- СТРУМ EPS (РЕЗЕРВ) ---
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "EPS Current"
    address: 56
    register_type: read      # Читаємо як Input Register
    value_type: U_WORD       # 16-бітне число без знаку (uint16)
    unit_of_measurement: "A"
    accuracy_decimals: 1
    device_class: current
    state_class: measurement
    icon: "mdi:current-ac"
    filters:
      - multiply: 0.1

  # --- НАПРУГА ГЕНЕРАТОРА ---
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Generator Voltage"
    address: 96
    register_type: read      # Читаємо як Input Register
    value_type: U_WORD       # 16-бітне число без знаку (uint16)
    unit_of_measurement: "V"
    accuracy_decimals: 1
    device_class: voltage
    state_class: measurement
    icon: "mdi:engine-outline"
    filters:
      - multiply: 0.1

  # --- СТРУМ ГЕНЕРАТОРА ---
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Generator Current"
    address: 97
    register_type: read      # Читаємо як Input Register
    value_type: U_WORD       # 16-бітне число без знаку (uint16)
    unit_of_measurement: "A"
    accuracy_decimals: 1
    device_class: current
    state_class: measurement
    icon: "mdi:current-ac"
    filters:
      - multiply: 0.1


  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Total Operation Time"
    address: 107                     # Стартова адреса (захопить 107 та 108 регістри)
    register_type: read
    value_type: U_DWORD             # 32-бітне число (uint32)
    unit_of_measurement: "h"         # Виводимо в годинах (hours)
    accuracy_decimals: 1             # Один знак після коми (наприклад, 142.5 год)
    icon: "mdi:hourglass-toggle"
    # Перераховуємо байти інвертора (0.5 хв) у повноцінні години
    filters:
      - multiply: 0.00833333


  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Battery SOH"
    address: 152
    register_type: read
    value_type: U_WORD
    unit_of_measurement: "%"
    accuracy_decimals: 0
    device_class: battery
    state_class: measurement
    icon: "mdi:heart-battery"

    # Сирий регістр 201 — потрібен як джерело "поточного" значення
  # для read-modify-write у switch нижче.
  - platform: modbus_controller
    modbus_controller_id: inverter
    id: inverter_reg_201_raw
    address: 201
    register_type: holding
    value_type: U_WORD
    internal: true

  # Сирі коди — потрібні як джерело для text_sensor нижче.
  - platform: modbus_controller
    modbus_controller_id: inverter
    id: inv_main_error_code_raw
    name: "Inverter Main Error Code (raw)"
    address: 32
    register_type: read
    value_type: U_WORD
    entity_category: diagnostic
    internal: true
 
  - platform: modbus_controller
    modbus_controller_id: inverter
    id: inv_main_warn_code_raw
    name: "Inverter Main Warning Code (raw)"
    address: 33
    register_type: read
    value_type: U_WORD
    entity_category: diagnostic
    internal: true


text_sensor:
  - platform: template
    name: "Inverter Mode"
    lambda: |-
      switch ((int)id(inverter_status).state) {
        case 0: return {"Waiting"};
        case 1: return {"On-grid"};
        case 2: return {"Off-grid"};
        case 3: return {"Fault"};
        case 4: return {"Flashing"};
        case 5: return {"Bypass"};
        case 6: return {"Self-charge"};
        case 7: return {"Generator"};
        default: return {"Unknown"};
      }


# --- РЕГІСТР 234: ЗВ'ЯЗОК З ХМАРОЮ ---
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Inverter Cloud Connection Status"
    address: 234
    register_type: holding
    entity_category: diagnostic
    icon: "mdi:cloud-check"
    lambda: |-
      if (data.size() < 2) return std::string("Немає даних");
      
      // Логіка для молодшого байта (data[1])
      uint8_t status_byte = data[1]; 
      if (status_byte == 0xAA) {
        return std::string("Норма (Підключено)");
      } else if (status_byte == 0x55) {
        return std::string("Помилка хмари");
      } else {
        return std::string("Невідомий статус");
      }


# --- РЕГІСТР 235: ВНУТРІШНІЙ ЗВ'ЯЗОК (ЛОГГЕР <-> ІНВЕРТОР) ---
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Inverter Logger Internal Comm Status"
    address: 235
    register_type: holding
    entity_category: diagnostic
    icon: "mdi:connection"
    lambda: |-
      if (data.size() < 2) return std::string("Немає даних");
      
      // У 235 регістрі значення зазвичай лежить у молодшому байті (data[1])
      uint8_t comm_byte = data[1]; 
      if (comm_byte == 0xAA) {
        return std::string("Зв'язок OK");
      } else if (comm_byte == 0x55) {
        return std::string("Помилка зв'язку з платою");
      } else {
        // Про всяк випадок перевіримо старший байт, якщо китайці записали туди
        if (data[0] == 0xAA) return std::string("Зв'язок OK");
        if (data[0] == 0x55) return std::string("Помилка зв'язку з платою");
        return std::string("Невідомий статус");
      }

  - platform: template
    name: "Inverter Main Error"
    icon: "mdi:alert-circle-outline"
    entity_category: diagnostic
    lambda: |-
      if (std::isnan(id(inv_main_error_code_raw).state)) return {};
      uint16_t code = (uint16_t)id(inv_main_error_code_raw).state;
      switch (code) {
        case 0:   return std::string("No Fault");
        case 103: return std::string("Inverter DC offset is too high");
        case 105: return std::string("Bypass AC output is overloaded");
        case 200: return std::string("Off-grid output voltage is too low");
        case 201: return std::string("Off-grid output voltage is too high");
        case 202: return std::string("Off-grid output has a short circuit");
        case 203: return std::string("Off-grid output is overloaded");
        case 204: return std::string("Abnormal off-grid output DC component offset");
        case 301: return std::string("Battery open circuit");
        case 305: return std::string("Battery overvoltage");
        case 306: return std::string("Battery overcurrent");
        case 307: return std::string("Battery communication fault");
        case 308: return std::string("BMS fault");
        case 400: return std::string("PV overvoltage");
        case 403: return std::string("PV short circuit");
        case 404: return std::string("PV reverse connection");
        case 500: return std::string("Abnormal BUS voltage");
        case 501: return std::string("Abnormal BUS voltage sampling");
        case 502: return std::string("Abnormal communication in the device");
        case 505: return std::string("Abnormal connection of the temperature sensor");
        case 506: return std::string("Device over-temperature");
        case 507: return std::string("Abnormal relay");
        case 509: return std::string("Anti-counter-current output timeout");
        case 510: return std::string("Mismatched software version");
        case 511: return std::string("Fan fault");
        default:  return "Unknown fault code: " + std::to_string(code);
      }
 
  - platform: template
    name: "Inverter Main Warning"
    icon: "mdi:alert-outline"
    entity_category: diagnostic
    lambda: |-
      if (std::isnan(id(inv_main_warn_code_raw).state)) return {};
      uint16_t code = (uint16_t)id(inv_main_warn_code_raw).state;
      switch (code) {
        case 0:   return std::string("No Warning");
        case 103: return std::string("Grid unavailable");
        case 104: return std::string("Overrange voltage of grid");
        case 105: return std::string("Overrange frequency of grid");
        case 106: return std::string("No output voltage from the generator");
        case 107: return std::string("Overrange output voltage of the generator");
        case 108: return std::string("Overrange output frequency of the generator");
        case 302: return std::string("Low battery");
        case 304: return std::string("Abnormal BMS information");
        case 305: return std::string("Low battery voltage alarm");
        case 502: return std::string("Abnormal memory reading and writing");
        default:  return "Unknown warning code: " + std::to_string(code);
      }
 


