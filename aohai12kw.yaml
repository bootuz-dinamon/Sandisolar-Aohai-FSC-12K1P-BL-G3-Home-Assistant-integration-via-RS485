substitutions:
  device_name: aohai
  device_description: "Esphome for Aohai"
  modbus_update_interval: 10s
  update_fast: 15s
  update_slow: 60s
  skip_updates_slow: "6" 
 # packet_len: "32"
  tx_pin: GPIO19  
  rx_pin: GPIO20

esphome:
  name: sandisolar12000
  friendly_name: Sandisolar12000

esp32:
  board: esp32-c6-devkitm-1
  framework:
    type: esp-idf



# Enable Home Assistant API
api:
  encryption:
    key: "***************************"

ota:
  - platform: esphome
    password: "*****************************"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Fallback Hotspot"
    password: "********************"

captive_portal:

#web_server:
#  port: 80
  

# Enable logging
logger:
  baud_rate: 0
  level: DEBUG




uart:
  id: mod_bus
  tx_pin: GPIO19
  rx_pin: GPIO20
  baud_rate: 9600
  parity: NONE
  stop_bits: 1
  #debug:


modbus:
  id: modbus1
  uart_id: mod_bus

modbus_controller:
  - id: inverter
    address: 1
    modbus_id: modbus1
    command_throttle: 100ms
    setup_priority: -10
    update_interval: 5s

sensor:
  # Статус інвертора
  - platform: modbus_controller
    modbus_controller_id: inverter
    id: inverter_status
    name: "Inverter Status"
    register_type: read
    address: 0
    value_type: U_WORD

  # Напруга AC інвертора
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Inverter Voltage"
    id: inverter_voltage
    register_type: read
    address: 2
    value_type: U_WORD
    unit_of_measurement: "V"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # Струм інвертора
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Inverter Current"
    id: inverter_current
    register_type: read
    address: 5
    value_type: S_WORD
    unit_of_measurement: "A"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
  
  #Inverter Maximum Rated Power
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Inverter Maximum Rated Power"
    address: 63
    register_type: holding          # Зчитуємо з блоку Holding регістрів
    value_type: U_DWORD             # Склеюємо 63 та 64 регістри в одне 32-бітке число
    unit_of_measurement: "W"
    accuracy_decimals: 0
    device_class: power
    state_class: measurement
    icon: "mdi:badge-account-alert"
    filters:
      - multiply: 0.1               # Множник 0.1W з документації

  # Температура інвертора
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Temp Inverter"
    id: inverter_temp
    register_type: read
    address: 10
    value_type: S_WORD
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # Температура IPM
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Temp Boost"
    id: boost_temp
    register_type: read
    address: 11
    value_type: S_WORD
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1


  # Grid Voltage
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Grid Voltage"
    id: grid_voltage
    register_type: read
    address: 42
    value_type: U_WORD
    unit_of_measurement: "V"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # Grid Current
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Grid Current"
    id: grid_current
    register_type: read
    address: 43
    value_type: S_WORD
    unit_of_measurement: "A"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # Частота мережі
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Grid Frequency"
    id: grid_frequency
    register_type: read
    address: 51
    value_type: U_WORD
    unit_of_measurement: "Hz"
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  # PV1 Voltage
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "PV1 Voltage"
    id: pv1_voltage
    register_type: read
    address: 64
    value_type: U_WORD
    unit_of_measurement: "V"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # PV1 Current
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "PV1 Current"
    id: pv1_current
    register_type: read
    address: 65
    value_type: U_WORD
    unit_of_measurement: "A"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # Розрахунок потужності PV1
  - platform: template
    name: "PV1 Power"
    unit_of_measurement: "W"
    accuracy_decimals: 0
    lambda: |-
      return id(pv1_voltage).state * id(pv1_current).state;


      
# Battery voltage
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Battery Voltage"
    id: battery_voltage
    register_type: read
    address: 127
    value_type: U_WORD
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

# Battery SOC
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Battery SOC"
    id: battery_soc
    register_type: read
    address: 128
    value_type: U_WORD
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    accuracy_decimals: 1


# BMS battery current
  # + = charge
  # - = discharge
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Battery Current"
    id: battery_current
    register_type: read
    address: 141
    value_type: S_WORD
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - multiply: 0.01


# Внутрішня напруга Bus1 (Регістр 8)
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Bus1 Voltage"
    address: 8
    register_type: read
    value_type: U_WORD 
    unit_of_measurement: "V"
    device_class: voltage
    filters:
      - multiply: 0.1 


# Загальна вихідна активна потужність (Регістр 286)
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Power Total Active"
    address: 286                     # Регістри 286 та 287
    register_type: read
    value_type: S_DWORD             # Обов'язково 32-біти зі знаком (sint32)
    unit_of_measurement: "W"
    accuracy_decimals: 1            # <--- Змініть на 1, щоб бачити десяті частини!
    device_class: power
    state_class: measurement
    icon: "mdi:lightning-bolt"
    filters:
      - multiply: -0.1              # <--- Множимо на -0.1, щоб прибрати мінус від інвертора

# Загальна потужність локального навантаження (Регістр 330)
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Power Out Load"
    address: 330
    register_type: read
    value_type: U_DWORD # 32-бітне число без знака (uint32)
    unit_of_measurement: "W"
    device_class: power
    filters:
      - multiply: 0.1 

  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "Power To User Total"
    address: 320
    register_type: read
    value_type: U_DWORD 
    unit_of_measurement: "W"
    device_class: power
    filters:
      - multiply: 0.1 # Згідно з таблицею крок 0.1W

 
# Швидкість обертання вентилятора (Регістр 106)
#  - platform: modbus_controller
#    modbus_controller_id: inverter
#    name: "Fan Speed"
#    address: 106
#    register_type: read
#    value_type: U_WORD 
#    unit_of_measurement: "RPM"
#    icon: "mdi:fan"



# 1. Струм батареї від BMS (Регістр 141)
  # Зверніть увагу: тип sint16, оскільки струм може бути від'ємним (розряд) або додатним (заряд)
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "BMS Battery Current"
    address: 141
    register_type: read
    value_type: S_WORD
    unit_of_measurement: "A"
    device_class: current
    accuracy_decimals: 2
    filters:
      - multiply: 0.01


# 3. Максимальний струм заряду, який дозволяє BMS (Регістр 143)
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "BMS Max Allowed Charge Current"
    address: 143
    register_type: read
    value_type: U_WORD
    unit_of_measurement: "A"
    device_class: current
    filters:
      - multiply: 0.1

# 4. Максимальний струм розряду, який дозволяє BMS (Регістр 144)
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "BMS Max Allowed Discharge Current"
    address: 144
    register_type: read
    value_type: U_WORD
    unit_of_measurement: "A"
    device_class: current
    filters:
      - multiply: 0.1

# Баланс комірок (Delta Volt) — тепер показуватиме 3 знаки після коми
